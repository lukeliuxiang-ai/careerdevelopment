<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>感谢 - 国芙藏象馆</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a3a2a;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide {
      position: relative;
      width: min(100vw, 177.78vh);
      height: min(56.25vw, 100vh);
      background: #C2F1C8;
      overflow: hidden;
    }
    .content {
      height: 100%;
      padding: 8% 8% 14%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    h2 {
      font-size: clamp(2rem, 4vw, 3rem);
      color: #1a4d3a;
      font-weight: 700;
      margin-bottom: 6%;
      letter-spacing: 0.15em;
    }
    .contact-wrap {
      display: flex;
      align-items: center;
      gap: 4rem;
      margin-top: 2%;
    }
    .contact-info {
      text-align: left;
    }
    .contact-info p {
      font-size: clamp(1rem, 2vw, 1.35rem);
      color: #2a5a45;
      line-height: 2;
    }
    .contact-info .name {
      font-size: clamp(1.2rem, 2.4vw, 1.6rem);
      font-weight: 600;
      color: #1a4d3a;
      margin-bottom: 0.5rem;
    }
    .qrcode img {
      width: clamp(120px, 18vw, 180px);
      height: clamp(120px, 18vw, 180px);
      object-fit: contain;
      border-radius: 6px;
      background: #fff;
      padding: 8px;
      box-shadow: 0 4px 16px rgba(26,77,58,0.15);
    }
    .qrcode-label {
      font-size: 0.8rem;
      color: #3d6b55;
      margin-top: 0.5rem;
    }
    .footer {
      position: absolute;
      bottom: 3%;
      left: 0;
      right: 0;
      z-index: 4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4%;
    }
    .page-num {
      font-size: 0.75rem;
      color: #3d6b55;
      opacity: 0.85;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 3%;
    }
    .nav-btn {
      display: inline-block;
      padding: 0.45rem 1.2rem;
      font-size: 0.85rem;
      color: #1a4d3a;
      background: rgba(255,255,255,0.75);
      border: 1px solid #5a9e7a;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .nav-btn:hover {
      background: rgba(255,255,255,0.95);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="content">
      <h2>感谢聆听</h2>
      <div class="contact-wrap">
        <div class="contact-info">
          <p class="name">刘翔</p>
          <p>137.2517.5539</p>
          <p>luke.liu@rg-consulting.cn</p>
        </div>
        <div class="qrcode">
          <img src="images/qrcode.jpeg" alt="">
          <p class="qrcode-label">微信扫码联系</p>
        </div>
      </div>
    </div>
    <div class="footer">
      <a class="nav-btn" href="08.html">← 上一页</a>
      <span></span>
    </div>
    <span class="page-num">第9页，共9页</span>
  </div>
</body>
</html>
