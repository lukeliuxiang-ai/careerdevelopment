<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人员招募 - 国芙藏象馆</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a3a2a;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide {
      position: relative;
      width: min(100vw, 177.78vh);
      height: min(56.25vw, 100vh);
      background: #C2F1C8;
      overflow: hidden;
    }
    .content {
      height: 100%;
      padding: 8% 10% 14%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    h2 {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      color: #1a4d3a;
      font-weight: 700;
      margin-bottom: 6%;
      padding-bottom: 0.8rem;
      border-bottom: 3px solid #5a9e7a;
      letter-spacing: 0.05em;
    }
    .recruit-text {
      font-size: clamp(1.1rem, 2.4vw, 1.5rem);
      color: #2a5a45;
      line-height: 1.9;
      padding: 2.5rem 3rem;
      background: rgba(255,255,255,0.45);
      border-radius: 8px;
      border-left: 5px solid #3d8b6a;
    }
    .footer {
      position: absolute;
      bottom: 3%;
      left: 0;
      right: 0;
      z-index: 4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4%;
    }
    .page-num {
      font-size: 0.75rem;
      color: #3d6b55;
      opacity: 0.85;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 3%;
    }
    .nav-btn {
      display: inline-block;
      padding: 0.45rem 1.2rem;
      font-size: 0.85rem;
      color: #1a4d3a;
      background: rgba(255,255,255,0.75);
      border: 1px solid #5a9e7a;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .nav-btn:hover {
      background: rgba(255,255,255,0.95);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="content">
      <h2>人员招募</h2>
      <p class="recruit-text">秉持经营优先，管理为辅的原则，在以上三项初见成效后开始物色和招募人力行政负责人。</p>
    </div>
    <div class="footer">
      <a class="nav-btn" href="06.html">← 上一页</a>
      <a class="nav-btn" href="08.html">下一页 →</a>
    </div>
    <span class="page-num">第7页，共9页</span>
  </div>
</body>
</html>
