<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>国芙藏象馆人力资源解决方案</title>
  <link rel="stylesheet" href="mobile.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a3a2a;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide {
      position: relative;
      width: min(100vw, 177.78vh);
      height: min(56.25vw, 100vh);
      background: #C2F1C8 url("images/cover.webp") center/cover no-repeat;
      overflow: hidden;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(194,241,200,0.85) 0%, rgba(194,241,200,0.55) 50%, rgba(194,241,200,0.75) 100%);
    }
    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 8% 10%;
      text-align: center;
    }
    h1 {
      font-size: clamp(2rem, 4.5vw, 3.2rem);
      font-weight: 700;
      color: #1a4d3a;
      letter-spacing: 0.08em;
      line-height: 1.4;
      margin-bottom: 1.5rem;
    }
    .date {
      font-size: clamp(1rem, 2vw, 1.4rem);
      color: #2d6b4f;
      font-weight: 500;
    }
    .logo {
      position: absolute;
      bottom: 12%;
      left: 5%;
      z-index: 3;
      max-height: 12%;
      max-width: 22%;
      object-fit: contain;
    }
    .footer {
      position: absolute;
      bottom: 3%;
      left: 0;
      right: 0;
      z-index: 4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4%;
    }
    .page-num {
      font-size: 0.75rem;
      color: #3d6b55;
      opacity: 0.85;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 3%;
    }
    .nav-btn {
      display: inline-block;
      padding: 0.45rem 1.2rem;
      font-size: 0.85rem;
      color: #1a4d3a;
      background: rgba(255,255,255,0.75);
      border: 1px solid #5a9e7a;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .nav-btn:hover {
      background: rgba(255,255,255,0.95);
      transform: translateY(-1px);
    }
    .nav-left { margin-right: auto; }
    .nav-right { margin-left: auto; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="overlay"></div>
    <img class="logo" src="images/company logo.png" alt="公司 Logo">
    <div class="content">
      <h1>国芙藏象馆<br>人力资源解决方案</h1>
      <p class="date">2026.6.11</p>
    </div>
    <div class="footer">
      <span></span>
      <a class="nav-btn nav-right" href="02.html">下一页 →</a>
    </div>
    <span class="page-num">第1页，共9页</span>
  </div>
</body>
</html>
