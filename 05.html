<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>搭建培养门店店长的体系流程 - 国芙藏象馆</title>
  <link rel="stylesheet" href="mobile.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a3a2a;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide {
      position: relative;
      width: min(100vw, 177.78vh);
      height: min(56.25vw, 100vh);
      background: #C2F1C8;
      overflow: hidden;
    }
    .content {
      height: 100%;
      padding: 5.5% 6% 13%;
      display: flex;
      flex-direction: column;
    }
    h2 {
      font-size: clamp(1.2rem, 2.6vw, 1.8rem);
      color: #1a4d3a;
      font-weight: 700;
      margin-bottom: 3%;
      padding-bottom: 0.6rem;
      border-bottom: 3px solid #5a9e7a;
      letter-spacing: 0.03em;
    }
    ul {
      list-style: none;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2.5%;
      overflow: hidden;
    }
    li {
      font-size: clamp(0.78rem, 1.45vw, 1.05rem);
      color: #2a5a45;
      line-height: 1.55;
      padding-left: 1.6rem;
      position: relative;
    }
    li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.5em;
      width: 8px;
      height: 8px;
      background: #3d8b6a;
      border-radius: 50%;
    }
    .footer {
      position: absolute;
      bottom: 3%;
      left: 0;
      right: 0;
      z-index: 4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4%;
    }
    .page-num {
      font-size: 0.75rem;
      color: #3d6b55;
      opacity: 0.85;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 3%;
    }
    .nav-btn {
      display: inline-block;
      padding: 0.45rem 1.2rem;
      font-size: 0.85rem;
      color: #1a4d3a;
      background: rgba(255,255,255,0.75);
      border: 1px solid #5a9e7a;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .nav-btn:hover {
      background: rgba(255,255,255,0.95);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="content">
      <h2>搭建培养门店店长的体系流程</h2>
      <ul>
        <li>为三位店长安排 Harrison 测评，并由顾问对其领导力和个性沟通特点给予公司管理层反馈</li>
        <li>店长除了向总经理汇报，同时安排顾问作为导师，每周一次 1 对 1 沟通，结合测评结果和公司要求帮助其提升领导力与改善沟通和管理方式</li>
        <li>通过至少为期 6 个月的双线管理，建立起店长与管理层的良性沟通，旨在为公司培养第一批优秀的店长</li>
        <li>顾问制定出优秀店长的人才画像，并提供面试流程支持</li>
        <li>6–8 周即可启动新店开业，新店店长可启用新的面试和甄选流程，并派至长沙分店驻点学习 5 天后可上岗</li>
      </ul>
    </div>
    <div class="footer">
      <a class="nav-btn" href="04.html">← 上一页</a>
      <a class="nav-btn" href="06.html">下一页 →</a>
    </div>
    <span class="page-num">第5页，共9页</span>
  </div>
</body>
</html>
