<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>项目目的 - 国芙藏象馆</title>
  <link rel="stylesheet" href="mobile.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a3a2a;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide {
      position: relative;
      width: min(100vw, 177.78vh);
      height: min(56.25vw, 100vh);
      background: #C2F1C8;
      overflow: hidden;
    }
    .content {
      height: 100%;
      padding: 8% 8% 14%;
      display: flex;
      flex-direction: column;
    }
    h2 {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      color: #1a4d3a;
      font-weight: 700;
      margin-bottom: 5%;
      padding-bottom: 0.8rem;
      border-bottom: 3px solid #5a9e7a;
      letter-spacing: 0.05em;
    }
    ul {
      list-style: none;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3.5%;
      padding-left: 0.5rem;
    }
    li {
      font-size: clamp(1rem, 2.2vw, 1.35rem);
      color: #2a5a45;
      line-height: 1.6;
      padding-left: 2rem;
      position: relative;
    }
    li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.55em;
      width: 10px;
      height: 10px;
      background: #3d8b6a;
      border-radius: 50%;
    }
    .footer {
      position: absolute;
      bottom: 3%;
      left: 0;
      right: 0;
      z-index: 4;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4%;
    }
    .page-num {
      font-size: 0.75rem;
      color: #3d6b55;
      opacity: 0.85;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 3%;
    }
    .nav-btn {
      display: inline-block;
      padding: 0.45rem 1.2rem;
      font-size: 0.85rem;
      color: #1a4d3a;
      background: rgba(255,255,255,0.75);
      border: 1px solid #5a9e7a;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .nav-btn:hover {
      background: rgba(255,255,255,0.95);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="content">
      <h2>项目目的</h2>
      <ul>
        <li>为国芙藏象馆门店梳理运营标准与流程</li>
        <li>搭建一个能快速高效培养门店店长的体系流程</li>
        <li>为公司创始人提供领导力赋能</li>
        <li>招募合适的人力行政负责人支撑公司的后台运营</li>
      </ul>
    </div>
    <div class="footer">
      <a class="nav-btn" href="index.html">← 上一页</a>
      <a class="nav-btn" href="03.html">下一页 →</a>
    </div>
    <span class="page-num">第2页，共9页</span>
  </div>
</body>
</html>
